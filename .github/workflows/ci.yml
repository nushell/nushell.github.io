name: CI
on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22

      - run: npm install
      # - run: npm run build
      - name: Build Static Docs
        run: npm run build
